<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b1d4d">
  <title>Games | No Labels, Designed by God</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top,#1d4c9e 0,#081735 45%,#030713 100%);
      color: #f7f9ff;
    }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(760px,100%);
      padding: 32px;
      border: 2px solid rgba(255,211,78,.55);
      border-radius: 24px;
      background: rgba(8,22,58,.96);
      box-shadow: 0 24px 70px rgba(0,0,0,.45);
      text-align: center;
    }
    .spinner {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      border: 7px solid rgba(255,255,255,.18);
      border-top-color: #ffd34e;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { margin: 0 0 12px; font-size: clamp(30px,6vw,52px); }
    p { line-height: 1.55; color: #cbd5f3; }
    button, a {
      display: inline-block;
      margin-top: 14px;
      padding: 13px 18px;
      border: 0;
      border-radius: 13px;
      background: linear-gradient(#fff0a4,#ffd34e);
      color: #2d2400;
      font: inherit;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
    }
    #error { display: none; }
  </style>
</head>
<body>
  <main id="loading">
    <div class="spinner" aria-hidden="true"></div>
    <h1>Brotherhood Bible Games</h1>
    <p>Loading the NLDG9 Sprint 2 tournament game engine…</p>
  </main>

  <main id="error">
    <h1>Unable to load the game</h1>
    <p>
      The Sprint 2 game file could not be reached. Confirm that this device has
      internet access, then try again.
    </p>
    <button type="button" onclick="location.reload()">Try Again</button>
  </main>

  <script>
    (async function loadSprint2() {
      const approvedSource =
        "https://raw.githubusercontent.com/dexgra-ui/NLDG9-Sprint-2/main/games.html";

      try {
        const response = await fetch(approvedSource, {
          cache: "no-store",
          mode: "cors"
        });

        if (!response.ok) {
          throw new Error("GitHub returned HTTP " + response.status);
        }

        const html = await response.text();

        if (
          !html.toLowerCase().includes("<!doctype html") ||
          !html.includes("No Labels, Designed by God")
        ) {
          throw new Error("The approved game file failed validation.");
        }

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error("NLDG9 Sprint 2 loader:", error);
        document.getElementById("loading").style.display = "none";
        document.getElementById("error").style.display = "block";
      }
    })();
  </script>
</body>
</html>
