name: Apply toolbar spacing fix

on:
  push:
    branches:
      - agent/fix-jeopardy-toolbar-spacing
    paths:
      - .github/workflows/apply-toolbar-spacing-fix.yml

permissions:
  contents: write

jobs:
  patch-games:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Patch the game layout
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('games.html')
          text = path.read_text()

          css_marker = '/* NLDG 0.9.2 SCOREBAR SPACING FIX */'
          css = r'''

          /* NLDG 0.9.2 SCOREBAR SPACING FIX */
          body.playing {
            --nldg-scorebar-height: 180px;
          }

          body.playing .scorebar {
            height: auto !important;
            min-height: 0;
            max-height: min(42dvh, 320px);
            overflow-y: auto;
          }

          body.playing #quizView,
          body.playing #memoryView,
          body.playing #jeopardyView {
            inset: calc(max(8px, env(safe-area-inset-top)) + var(--nldg-scorebar-height) + 8px) 0 0 !important;
          }

          @media (orientation: landscape) and (max-height: 850px) {
            body.playing #quizView,
            body.playing #memoryView,
            body.playing #jeopardyView {
              inset: calc(max(6px, env(safe-area-inset-top)) + var(--nldg-scorebar-height) + 6px) 0 0 !important;
            }
          }
          '''

          js_marker = '/* NLDG 0.9.2 SCOREBAR HEIGHT OBSERVER */'
          js = r'''
          <script>
          /* NLDG 0.9.2 SCOREBAR HEIGHT OBSERVER */
          (() => {
            const scorebar = document.getElementById('scorebar');
            if (!scorebar || !('ResizeObserver' in window)) return;

            const syncScorebarHeight = () => {
              if (scorebar.classList.contains('hidden')) return;
              const height = Math.ceil(scorebar.getBoundingClientRect().height);
              document.documentElement.style.setProperty('--nldg-scorebar-height', `${height}px`);
              document.body.style.setProperty('--nldg-scorebar-height', `${height}px`);
            };

            const observer = new ResizeObserver(syncScorebarHeight);
            observer.observe(scorebar);
            window.addEventListener('orientationchange', () => setTimeout(syncScorebarHeight, 250));
            window.addEventListener('resize', syncScorebarHeight);
            document.addEventListener('nldg:open-library', () => requestAnimationFrame(syncScorebarHeight));
            requestAnimationFrame(syncScorebarHeight);
          })();
          </script>
          '''

          if css_marker not in text:
            text = text.replace('</style>', css + '\n</style>', 1)
          if js_marker not in text:
            text = text.replace('</body>', js + '\n</body>', 1)

          path.write_text(text)
          PY

          rm .github/workflows/apply-toolbar-spacing-fix.yml

      - name: Commit the layout fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add games.html .github/workflows/apply-toolbar-spacing-fix.yml
          git commit -m "Fix game toolbar overlap on iPad"
          git push origin HEAD:${{ github.ref_name }}
