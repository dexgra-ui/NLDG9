<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b1d4d">
  <title>Games | No Labels, Designed by God</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html,body {
      margin:0;
      min-height:100%;
      font-family:Arial,Helvetica,sans-serif;
      background:radial-gradient(circle at top,#1d4c9e 0,#081735 45%,#030713 100%);
      color:#f7f9ff;
    }
    body {
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }
    main {
      width:min(760px,100%);
      padding:32px;
      border:2px solid rgba(255,211,78,.55);
      border-radius:24px;
      background:rgba(8,22,58,.96);
      box-shadow:0 24px 70px rgba(0,0,0,.45);
      text-align:center;
    }
    .spinner {
      width:64px;height:64px;margin:0 auto 24px;
      border:7px solid rgba(255,255,255,.18);
      border-top-color:#ffd34e;border-radius:50%;
      animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    h1 { margin:0 0 12px;font-size:clamp(30px,6vw,52px); }
    p { line-height:1.55;color:#cbd5f3; }
    button {
      margin-top:14px;padding:13px 18px;border:0;border-radius:13px;
      background:linear-gradient(#fff0a4,#ffd34e);color:#2d2400;
      font:inherit;font-weight:900;cursor:pointer;
    }
    #error { display:none; }
    #details {
      margin-top:14px;
      font-size:14px;
      color:#fff0a4;
      overflow-wrap:anywhere;
    }
  </style>
</head>
<body>
  <main id="loading">
    <div class="spinner" aria-hidden="true"></div>
    <h1>Brotherhood Bible Games</h1>
    <p>Loading Sprint 2.1…</p>
  </main>

  <main id="error">
    <h1>Unable to load the game</h1>
    <p>The game source did not load within 12 seconds.</p>
    <button type="button" onclick="location.reload()">Try Again</button>
    <div id="details"></div>
  </main>

<script>
(async function loadSprint21(){
  const apiUrl =
    "https://api.github.com/repos/dexgra-ui/NLDG9-Sprint-2/contents/games.html?ref=main";

  const sprint21CSS = `
  :root{
    --s21-scorebar-h:96px;
    --s21-toolbar-h:74px;
    --s21-gap:10px;
  }

  body.playing .scorebar{
    height:var(--s21-scorebar-h)!important;
  }

  body.playing .tournament-toolbar,
  body.playing #tournamentToolbar,
  body.playing .shared-toolbar{
    position:fixed!important;
    z-index:120!important;
    top:calc(max(8px,env(safe-area-inset-top)) + var(--s21-scorebar-h) + var(--s21-gap))!important;
    left:max(12px,env(safe-area-inset-left))!important;
    right:max(12px,env(safe-area-inset-right))!important;
    min-height:var(--s21-toolbar-h)!important;
    margin:0!important;
    padding:10px 14px!important;
    display:flex!important;
    align-items:center!important;
    justify-content:center!important;
    flex-wrap:wrap!important;
    gap:10px!important;
    border-radius:18px!important;
    background:rgba(3,10,30,.97)!important;
    border:2px solid rgba(255,255,255,.16)!important;
    box-shadow:0 12px 34px rgba(0,0,0,.45)!important;
    backdrop-filter:blur(10px);
  }

  body.playing #quizView,
  body.playing #memoryView,
  body.playing #jeopardyView{
    inset:calc(max(8px,env(safe-area-inset-top)) + var(--s21-scorebar-h) + var(--s21-toolbar-h) + (var(--s21-gap) * 2)) 0 0!important;
  }

  body.playing .game-panel{
    padding-top:18px!important;
  }

  body.playing .game-heading{
    position:relative!important;
    z-index:1!important;
    padding-top:4px!important;
    margin-bottom:6px!important;
  }

  body.playing .game-heading h3{
    opacity:1!important;
    visibility:visible!important;
    color:#f7f9ff!important;
    text-shadow:0 3px 14px rgba(0,0,0,.8)!important;
  }

  body.playing .back-library{
    opacity:1!important;
    visibility:visible!important;
    pointer-events:auto!important;
    min-width:150px!important;
  }

  .team.active{
    outline:4px solid #ffd34e!important;
    box-shadow:0 0 0 3px rgba(255,211,78,.18),0 0 28px rgba(255,211,78,.42)!important;
  }

  button,.btn,.answer,.menu-card,.jcell,.memory-card{
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }

  @media (orientation:landscape) and (max-height:850px){
    :root{--s21-scorebar-h:78px;--s21-toolbar-h:64px;--s21-gap:6px}
    body.playing .tournament-toolbar,
    body.playing #tournamentToolbar,
    body.playing .shared-toolbar{padding:7px 10px!important}
  }

  @media (max-width:760px){
    :root{--s21-scorebar-h:100px;--s21-toolbar-h:122px}
    body.playing .tournament-toolbar,
    body.playing #tournamentToolbar,
    body.playing .shared-toolbar{
      justify-content:flex-start!important;
      overflow-x:auto!important;
      flex-wrap:nowrap!important;
    }
  }
  `;

  const sprint21JS = `
  (function(){
    let lastTap = 0;

    function markToolbar(){
      const nodes = [...document.querySelectorAll("div,nav,section")];
      for(const node of nodes){
        const text = node.textContent || "";
        if(
          text.includes("Next Team") &&
          text.includes("Skip Team") &&
          text.includes("Undo Score")
        ){
          node.classList.add("tournament-toolbar");
          return;
        }
      }
    }

    document.addEventListener("click",function(event){
      const target = event.target.closest("button,.btn,.answer,.jcell,.memory-card,.menu-card");
      if(!target) return;
      const now = Date.now();
      if(now-lastTap < 300){
        event.preventDefault();
        event.stopImmediatePropagation();
      }
      lastTap = now;
    },true);

    function initialize(){
      markToolbar();
      const observer = new MutationObserver(markToolbar);
      observer.observe(document.body,{childList:true,subtree:true});
      console.info("NLDG9 Sprint 2.1 loaded");
    }

    if(document.readyState === "loading"){
      document.addEventListener("DOMContentLoaded",initialize);
    }else{
      initialize();
    }
  })();
  `;

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 12000);

  try {
    const response = await fetch(apiUrl, {
      cache: "no-store",
      headers: { "Accept": "application/vnd.github+json" },
      signal: controller.signal
    });

    if (!response.ok) {
      throw new Error("GitHub API returned HTTP " + response.status);
    }

    const data = await response.json();

    if (!data.content || data.encoding !== "base64") {
      throw new Error("GitHub did not return the expected file content.");
    }

    const normalized = data.content.replace(/\s/g, "");
    const binary = atob(normalized);
    const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
    let html = new TextDecoder("utf-8").decode(bytes);

    if (
      !html.toLowerCase().includes("<!doctype html") ||
      !html.includes("No Labels, Designed by God")
    ) {
      throw new Error("The Sprint 2 file failed validation.");
    }

    html = html.replace(
      "</head>",
      '<style id="nldg9-sprint21-css">' + sprint21CSS + "</style></head>"
    );

    html = html.replace(
      "</body>",
      '<script id="nldg9-sprint21-js">' +
      sprint21JS.replace(/<\/script>/gi, "<\\/script>") +
      "<\\/script></body>"
    );

    clearTimeout(timeout);
    document.open();
    document.write(html);
    document.close();

  } catch (error) {
    clearTimeout(timeout);
    console.error("NLDG9 Sprint 2.1 loader:", error);
    document.getElementById("loading").style.display = "none";
    document.getElementById("error").style.display = "block";
    document.getElementById("details").textContent =
      error.name === "AbortError"
        ? "The request timed out."
        : error.message;
  }
})();
</script>
</body>
</html>
